name: Lint

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.zsh"

permissions:
  contents: read

jobs:
  zsh-syntax:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Check zsh syntax
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! zsh -n "$file"; then
              echo "FAIL: $file"
              failed=1
            else
              echo "OK:   $file"
            fi
          done < <(find . -name "*.zsh" -not -path "./.git/*" -print0)
          exit $failed
