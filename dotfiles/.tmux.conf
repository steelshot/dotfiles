# =============================================================================
# Terminal
# =============================================================================

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"          # true colour
set -as terminal-overrides ",*:Smulx=\E[4::%p1%dm"   # undercurl
set -as terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m" # undercurl colour

# =============================================================================
# General
# =============================================================================

set -g mouse on
set -g base-index 1           # start windows at 1
setw -g pane-base-index 1     # start panes at 1
set -g renumber-windows on    # renumber on close
set -g history-limit 50000
set -g escape-time 0          # no delay for escape key
set -g focus-events on        # pass focus events to apps (vim, etc.)
set -g set-clipboard on

# =============================================================================
# Key bindings
# =============================================================================

# Prefix: Ctrl-b (default)
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =============================================================================
# Status bar
# =============================================================================

set -g status-position top
set -g status-style "bg=default"
set -g status-left-length 30
set -g status-right-length 60
set -g status-left "#[fg=#5f87af,bold]#S #[fg=default]"
set -g status-right "#[fg=#626262]%H:%M  %d %b"
setw -g window-status-current-style "fg=#5f87af,bold"
setw -g window-status-style "fg=#626262"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
